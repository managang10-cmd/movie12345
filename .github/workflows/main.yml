name: BMS Tracker 20min
on:
  schedule:
    - cron: '13,33,53 * * * *' # Runs every 20 minutes
  workflow_dispatch:      # Allows manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    # --- CRITICAL: This allows GitHub to save the known_movies.txt file ---
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Downloads history to allow pushing updates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 requests

      - name: Run tracker
        env:
          BOT_TOKEN_1: ${{ secrets.BOT_TOKEN }}
          CHAT_ID_1: ${{ secrets.CHAT_ID }}
          BOT_TOKEN_2: ${{ secrets.BOT_TOKEN_2 }}
          CHAT_ID_2: ${{ secrets.CHAT_ID_2 }}
          BOT_TOKEN_3: ${{ secrets.BOT_TOKEN_3 }}
          CHAT_ID_3: ${{ secrets.CHAT_ID_3 }}
        run: python tracker.py

      - name: Save and Sync State
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if the file exists before trying to add it
          if [ -f known_movies.txt ]; then
            git add known_movies.txt
            
            # Commit only if there are changes (avoids errors if nothing new)
            if git diff --staged --quiet; then
              echo "No changes in movie list."
            else
              git commit -m "Update known movies [skip ci]"
              
              # Pull the latest to avoid 'rejected' error, then push
              git pull --rebase origin main
              git push origin main
            fi
          else
            echo "known_movies.txt was not created by the script."
          fi
