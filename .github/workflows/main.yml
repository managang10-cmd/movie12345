name: BMS Hourly Check
on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch:     # Adds a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 requests
      - name: Run tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python tracker.py
      - name: Save state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Fetch the latest changes from the remote
          git fetch origin main
          # Reset to the latest remote state to avoid conflicts
          git reset --hard origin/main
          if [ -f known_movies.txt ]; then
            git add known_movies.txt
            git commit -m "Update known movies" || echo "No changes to commit"
            git push origin main
          else
            echo "File known_movies.txt not found, skipping git push."
          fi
          
